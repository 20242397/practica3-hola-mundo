<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hola Mundo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #00ff88;
      --accent2: #ff3cac;
      --accent3: #ffcd3c;
      --text: #e8e8f0;
      --muted: #5a5a7a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0%   { transform: translate(0,0); }
      100% { transform: translate(60px,60px); }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -120px; right: -80px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 60%; animation-delay: -6s; }

    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(20px,-20px) scale(1.05); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 2px;
      background: rgba(18,18,26,0.7);
      backdrop-filter: blur(20px);
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp 1s 0.2s ease both;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      animation: fadeUp 1s 0.35s ease both;
    }

    h1 .hola {
      display: block;
      color: var(--text);
    }

    h1 .mundo {
      display: block;
      -webkit-text-stroke: 2px var(--accent);
      color: transparent;
      position: relative;
    }

    h1 .mundo::after {
      content: 'MUNDO';
      position: absolute;
      left: 3px;
      top: 3px;
      -webkit-text-stroke: 2px var(--accent2);
      color: transparent;
      z-index: -1;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 2rem auto;
      animation: fadeUp 1s 0.5s ease both;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.8;
      animation: fadeUp 1s 0.65s ease both;
    }

    .subtitle span {
      color: var(--accent3);
    }

    /* Badge strip */
    .badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2.5rem;
      animation: fadeUp 1s 0.8s ease both;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.8rem;
      border: 1px solid;
      border-radius: 1px;
      letter-spacing: 0.1em;
    }

    .badge-green  { border-color: var(--accent);  color: var(--accent); }
    .badge-pink   { border-color: var(--accent2); color: var(--accent2); }
    .badge-yellow { border-color: var(--accent3); color: var(--accent3); }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--accent);
      border-style: solid;
    }
    .tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Scan line effect */
    @keyframes scan {
      0%   { top: -10%; }
      100% { top: 110%; }
    }
    .scanline {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), transparent);
      animation: scan 6s linear infinite;
      pointer-events: none;
      z-index: 5;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      z-index: 10;
      animation: fadeUp 1s 1s ease both;
    }

    @media (max-width: 600px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanline"></div>

  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <p class="tag">// Práctica 3 — Automatización Web</p>

    <h1>
      <span class="hola">HOLA</span>
      <span class="mundo">MUNDO</span>
    </h1>

    <div class="divider"></div>

    <p class="subtitle">
      Desplegado automáticamente desde<br/>
      <span>GitHub → GitHub Pages</span>
    </p>

    <div class="badges">
      <span class="badge badge-green">GitHub Pages</span>
      <span class="badge badge-pink">CI/CD</span>
      <span class="badge badge-yellow">Auto Deploy</span>
    </div>
  </div>

  <p class="footer">ITLA · Automatización · 2026</p>

</body>
</html>
